<!-- Header -->
<app-header 
  *ngIf="!isLoading && showHeader" 
  (menuToggle)="toggleMenu($event)">
</app-header>

<!-- Sidenav -->
<app-sidenav 
  *ngIf="!isLoading && showHeader" 
  [isOpen]="menuOpen"
  (close)="menuOpen = false">
</app-sidenav>

<!-- Loading Screen -->
<div *ngIf="isLoading" class="loading-screen">
  Loading...
</div>

<!-- Main Content -->
<router-outlet *ngIf="!isLoading"></router-outlet>

<!-- Footer -->
<app-footer *ngIf="!isLoading && showHeader"></app-footer>
