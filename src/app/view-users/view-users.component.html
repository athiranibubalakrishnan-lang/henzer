<div class="container">

  <h2 class="title">View Users</h2>

  <!-- Search -->
  <div class="top-bar">
    <input type="text" placeholder="Search by username, email or role" [(ngModel)]="searchText">
    <button class="search-btn">Search</button>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table class="product-table">
      <thead>
        <tr>
          <th>Username</th>
          <th>Email</th>
          <th>Role</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of filteredUsers; let i = index">
          <td>{{ u.userName }}</td>
          <td>{{ u.email }}</td>
          <td>{{ u.role }}</td>
          <td>{{ u.status }}</td>
          <td>
            <button (click)="deleteUser(i)">Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
