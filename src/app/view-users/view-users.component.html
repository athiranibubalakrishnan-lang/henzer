<div class="page-wrapper">
  <div class="page-header">
    <h2>View Users</h2>
    <p>All registered users</p>
  </div>

  <div class="card">
    <div class="search-row">
      <input type="text" [(ngModel)]="searchText" placeholder="Search by name, email or role" />
      <button class="btn-primary" (click)="refresh($event)">Refresh</button>
    </div>

    @if (loading) {
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>Loading users...</p>
      </div>
    } @else {
      <div class="table-wrapper" style="margin-top: 20px">
        <table class="product-table">
          <thead>
            <tr>
              <th>Username</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            @for (u of filteredUsers; track u.email) {
              <tr>
                <td>{{ u.username }}</td>
                <td>{{ u.email }}</td>
                <td>{{ u.role }}</td>
                <td>
                  <span class="badge"
                    [class.active]="u.status === 'ACTIVE'"
                    [class.inactive]="u.status !== 'ACTIVE'">
                    {{ u.status }}
                  </span>
                </td>
              </tr>
            } @empty {
              <tr><td colspan="4" class="empty-row">No users found.</td></tr>
            }
          </tbody>
        </table>
      </div>
    }
  </div>
</div>
