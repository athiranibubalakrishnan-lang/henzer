@if (toast) {
  <div class="toast">{{ toast }}</div>
}

<div class="page-wrapper">
  <div class="page-header">
    <h2>Add Product</h2>
    <p>Fill in the details below to add a new product</p>
  </div>

  <div class="card">
    <form (ngSubmit)="addProduct()" #productForm="ngForm">

      <!-- Basic Info -->
      <h3 class="section-title">Basic Information</h3>
      <div class="form-grid">

        <div class="form-group full-width">
          <label>Product Name <span class="required">*</span></label>
          <input type="text" [(ngModel)]="productName" name="productName"
            placeholder="Enter product name" required />
        </div>

        <div class="form-group">
          <label>Category <span class="required">*</span></label>
          <select [(ngModel)]="category" name="category" required>
            <option value="">-- Select Category --</option>
            <option value="HENZER">HENZER</option>
            <option value="SILICA">SILICA</option>
            <option value="SILICA LITE">SILICA LITE</option>
          </select>
        </div>

        <div class="form-group">
          <label>Brand <span class="required">*</span></label>
          <input type="text" [(ngModel)]="brand" name="brand" placeholder="Enter brand" required />
        </div>

        <div class="form-group">
          <label>SKU <span class="required">*</span></label>
          <input type="text" [(ngModel)]="sku" name="sku"
            placeholder="e.g. SKU-001" required />
        </div>

        <div class="form-group">
          <label>Supplier Code</label>
          <input type="text" [(ngModel)]="supplierCode" name="supplierCode" placeholder="e.g. SUP-123" />
        </div>

      </div>

      <!-- Pricing -->
      <h3 class="section-title">Pricing</h3>
      <div class="form-grid">

        <div class="form-group">
          <label>Supplier Price (¥) <span class="required">*</span></label>
          <input type="number" [(ngModel)]="supplierPrice" name="supplierPrice"
            min="0.01" step="0.01" placeholder="0.00" required />
        </div>

      </div>

      <!-- Descriptions -->
      <h3 class="section-title">Descriptions</h3>
      <div class="form-grid">

        <div class="form-group">
          <label>Short Description</label>
          <input type="text" [(ngModel)]="shortDescription" name="shortDescription" placeholder="Brief summary" />
        </div>

        <div class="form-group">
          <label>Product Description</label>
          <input type="text" [(ngModel)]="productDescription" name="productDescription" placeholder="Product description" />
        </div>

        <div class="form-group full-width">
          <label>Full Description</label>
          <textarea [(ngModel)]="description" name="description" rows="3" placeholder="Detailed description"></textarea>
        </div>

        <div class="form-group full-width">
          <label>Remarks</label>
          <textarea [(ngModel)]="remarks" name="remarks" rows="2" placeholder="Internal remarks or notes"></textarea>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="resetForm()">Reset</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Add Product' }}
        </button>
      </div>

    </form>
  </div>
</div>
