@if (toast) {
  <div class="toast">{{ toast }}</div>
}

<div class="page-wrapper">
  <div class="page-header">
    <h2>Add Product</h2>
    <p>Fill in the details below to add a new product</p>
  </div>

  <div class="card">
    <form (ngSubmit)="addProduct()" #productForm="ngForm">

      <!-- Basic Info -->
      <h3 class="section-title">Basic Information</h3>
      <div class="form-grid">

        <div class="form-group full-width">
          <label>Product Name <span class="required">*</span></label>
          <input type="text" [(ngModel)]="productName" name="productName" placeholder="Enter product name" required />
        </div>

        <div class="form-group">
          <label>Category</label>
          <select [(ngModel)]="category" name="category">
            <option value="">-- Select Category --</option>
            <option value="HENZER">HENZER</option>
            <option value="SILICA">SILICA</option>
            <option value="SILICA LITE">SILICA LITE</option>
          </select>
        </div>

        <div class="form-group">
          <label>Brand</label>
          <input type="text" [(ngModel)]="brand" name="brand" />
        </div>

        <div class="form-group">
          <label>SKU</label>
          <input type="text" [(ngModel)]="sku" name="sku" placeholder="e.g. SKU-001" />
        </div>

        <div class="form-group">
          <label>Supplier Code</label>
          <input type="text" [(ngModel)]="supplierCode" name="supplierCode" placeholder="e.g. SUP-123" />
        </div>

      </div>

      <!-- Pricing -->
      <h3 class="section-title">Pricing</h3>
      <div class="form-grid">

        <div class="form-group">
          <label>Supplier Price (¥)</label>
          <input type="number" [(ngModel)]="supplierPrice" name="supplierPrice" min="0" placeholder="0.00" />
        </div>

      </div>

      <!-- Descriptions -->
      <h3 class="section-title">Descriptions</h3>
      <div class="form-grid">

        <div class="form-group">
          <label>Short Description</label>
          <input type="text" [(ngModel)]="shortDescription" name="shortDescription" placeholder="Brief summary" />
        </div>

        <div class="form-group">
          <label>Product Description</label>
          <input type="text" [(ngModel)]="productDescription" name="productDescription" placeholder="Product description" />
        </div>

        <div class="form-group full-width">
          <label>Full Description</label>
          <textarea [(ngModel)]="description" name="description" rows="3" placeholder="Detailed description"></textarea>
        </div>

        <div class="form-group full-width">
          <label>Remarks</label>
          <textarea [(ngModel)]="remarks" name="remarks" rows="2" placeholder="Internal remarks or notes"></textarea>
        </div>

      </div>

      <!-- Settings -->
      <h3 class="section-title">Settings</h3>
      <div class="form-grid">

        <div class="form-group">
          <label>Visibility</label>
          <select [(ngModel)]="visibility" name="visibility">
            <option value="PUBLIC">PUBLIC</option>
            <option value="PRIVATE">PRIVATE</option>
            <option value="HIDDEN">HIDDEN</option>
          </select>
        </div>

        @if (!isDealer) {
          <div class="form-group">
            <label>Approval Status</label>
            <select [(ngModel)]="status" name="status">
              <option value="PENDING">PENDING</option>
              <option value="APPROVED">APPROVED</option>
              <option value="REJECTED">REJECTED</option>
            </select>
          </div>
        }

        <div class="form-group toggles">
          <label class="toggle-label">
            <input type="checkbox" [(ngModel)]="inStock" name="inStock" />
            <span>In Stock</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" [(ngModel)]="publishedStatus" name="publishedStatus" />
            <span>Published</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" [(ngModel)]="active" name="active" />
            <span>Active</span>
          </label>
        </div>

      </div>

      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="resetForm()">Reset</button>
        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Saving...' : 'Add Product' }}
        </button>
      </div>

    </form>
  </div>
</div>
