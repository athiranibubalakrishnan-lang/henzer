<div class="page-wrapper">

  <div class="page-header">
    <h2>Manage Categories</h2>
    <p>Categories added here will appear in the product form</p>
  </div>

  <div class="card">

    <div class="input-row">
      <input
        type="text"
        [(ngModel)]="categoryName"
        placeholder="Enter category name (e.g. Mobile, Laptop)"
        (keyup.enter)="addCategory()"
      />
      <button class="btn-primary" (click)="addCategory()">+ Add</button>
    </div>

    @if (categories.length > 0) {
      <div class="category-list">
        @for (cat of categories; track cat; let i = $index) {
          <div class="category-chip">
            <span>{{ cat }}</span>
            <button class="delete-btn" (click)="deleteCategory(i)" title="Remove">✕</button>
          </div>
        }
      </div>
    } @else {
      <div class="empty-state">
        <span>🗂️</span>
        <p>No categories added yet</p>
      </div>
    }

  </div>

</div>
