<div class="overlay" *ngIf="isOpen" (click)="closeMenu()"></div>

<div class="sidenav" [class.open]="isOpen">

  <div class="sidenav-header">
    <span class="sidenav-title">Menu</span>
    <button class="close-btn" (click)="closeMenu()">✕</button>
  </div>

  <ul>
    <li (click)="navigate('/home')">
      <span class="icon">🏠</span> Home
    </li>
    <li (click)="navigate('/about')">
      <span class="icon">ℹ️</span> About
    </li>
    <li *ngIf="!isUser" (click)="navigate('/add-product')">
      <span class="icon">➕</span> Add Product
    </li>
    <li *ngIf="!isUser" (click)="navigate('/add-category')">
      <span class="icon">🗂️</span> Add Category
    </li>
    <li *ngIf="!isUser" (click)="navigate('/view-products')">
      <span class="icon">📦</span> View Products
    </li>
    <li *ngIf="isAdmin" (click)="navigate('/add-user')">
      <span class="icon">👤</span> Create User
    </li>
    <li *ngIf="isAdmin" (click)="navigate('/view-users')">
      <span class="icon">👥</span> View Users
    </li>
    <li (click)="navigate('/contact')">
      <span class="icon">✉️</span> Contact
    </li>
    <li *ngIf="isUser" (click)="navigate('/shop')">
      <span class="icon">🏪</span> Shop
    </li>
    <li *ngIf="isUser" (click)="navigate('/cart')">
      <span class="icon">🛒</span> Cart
    </li>
  </ul>

  <div class="sidenav-footer">
    <button class="logout-btn" (click)="logout()">
      <span>⏻</span> Logout
    </button>
  </div>

</div>
