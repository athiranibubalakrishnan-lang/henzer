<header class="header">

  <div class="left-section">
    <div class="menu-btn" (click)="toggleMenu($event)">
      <span></span><span></span><span></span>
    </div>
    <img src="assets/logo.png" class="logo" alt="Logo" />
  </div>

  <nav class="nav-links">
    <a routerLink="/home" routerLinkActive="active-link">Home</a>
    <a routerLink="/about" routerLinkActive="active-link">About</a>

    <ng-container *ngIf="!isUser">
      <div class="dropdown" (click)="toggleDropdown($event)">
        <span class="dropdown-title">Products ▾</span>
        <div class="dropdown-menu" [class.show]="showDropdown">
          <a routerLink="/add-product">Add Product</a>
          <a routerLink="/add-category">Add Category</a>
          <a routerLink="/view-products">View Products</a>
        </div>
      </div>
    </ng-container>

    <ng-container *ngIf="isAdmin">
      <a routerLink="/add-user" routerLinkActive="active-link">Create User</a>
      <a routerLink="/view-users" routerLinkActive="active-link">View Users</a>
    </ng-container>

    <a routerLink="/contact" routerLinkActive="active-link">Contact</a>

    <ng-container *ngIf="isUser">
      <a routerLink="/shop" routerLinkActive="active-link">Shop</a>
      <a routerLink="/cart" routerLinkActive="active-link" class="cart-link">🛒 Cart</a>
    </ng-container>
  </nav>

  <div class="right-section">
    <div class="user-info">
      <span class="avatar">{{ userInitial }}</span>
      <span class="username">{{ userName }}</span>
    </div>
    <button class="logout-btn" (click)="logout()">
      <span>⏻</span> Logout
    </button>
  </div>

</header>
