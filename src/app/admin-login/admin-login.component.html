<div class="login-page">

  <div class="login-logo">
    <img src="assets/logo.png" alt="Logo" />
  </div>

  <div class="login-card">
    <h2>Login</h2>
    <p class="subtitle">Sign in to your account</p>

    @if (errorMsg) {
      <div class="error-msg">{{ errorMsg }}</div>
    }

    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrapper">
        <span class="input-icon">✉</span>
        <input type="email" [(ngModel)]="email" placeholder="Enter your email"
          (keyup.enter)="login()" />
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <span class="input-icon">🔒</span>
        <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
          placeholder="Enter your password" (keyup.enter)="login()" />
        <span class="toggle-eye" (click)="showPassword = !showPassword">
          {{ showPassword ? '🙈' : '👁' }}
        </span>
      </div>
    </div>

    <button class="login-btn" (click)="login()" [disabled]="loading">
      {{ loading ? 'Signing in...' : 'Sign In' }}
    </button>
  </div>

</div>
