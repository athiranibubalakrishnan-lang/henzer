<div class="login-page">
  <div class="login-logo">
    <img src="assets/logo.png" alt="Logo" />
  </div>

  <div class="login-cards">

    <div class="login-card">
      <div class="card-badge admin-badge">Admin</div>
      <h2>Admin Login</h2>
      <p class="subtitle">Sign in to your admin account</p>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input type="email" [(ngModel)]="adminEmail" placeholder="Enter your email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input [type]="showAdminPassword ? 'text' : 'password'" [(ngModel)]="adminPassword" placeholder="Enter your password" />
          <span class="toggle-eye" (click)="showAdminPassword = !showAdminPassword">{{ showAdminPassword ? '🙈' : '👁' }}</span>
        </div>
      </div>
      <button class="login-btn admin-btn" (click)="adminLogin()" [disabled]="adminLoading">
        {{ adminLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>

    <div class="login-card">
      <div class="card-badge dealer-badge">Dealer</div>
      <h2>Dealer Login</h2>
      <p class="subtitle">Sign in to your dealer account</p>
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input type="email" [(ngModel)]="dealerEmail" placeholder="Enter your email" />
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input [type]="showDealerPassword ? 'text' : 'password'" [(ngModel)]="dealerPassword" placeholder="Enter your password" />
          <span class="toggle-eye" (click)="showDealerPassword = !showDealerPassword">{{ showDealerPassword ? '🙈' : '👁' }}</span>
        </div>
      </div>
      <button class="login-btn dealer-btn" (click)="dealerLogin()" [disabled]="dealerLoading">
        {{ dealerLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>

  </div>
</div>
