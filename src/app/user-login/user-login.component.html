<div class="login-page">
  <div class="login-logo">
    <img src="assets/logo.png" alt="Logo" />
  </div>

  <div class="login-cards">
    <div class="login-card">
      <div class="card-badge user-badge">User</div>
      <h2>Welcome</h2>
      <p class="subtitle">Sign in to browse products</p>

      <div class="form-group">
        <label>Email Address</label>
        <div class="input-wrapper">
          <span class="input-icon">✉</span>
          <input type="email" [(ngModel)]="userEmail" placeholder="Enter your email" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="userPassword" placeholder="Enter your password" />
          <span class="toggle-eye" (click)="showPassword = !showPassword">{{ showPassword ? '🙈' : '👁' }}</span>
        </div>
      </div>

      <button class="login-btn user-btn" (click)="login()" [disabled]="loading">
        {{ loading ? 'Signing in...' : 'Sign In' }}
      </button>
    </div>
  </div>
</div>
