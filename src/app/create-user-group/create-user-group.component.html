<div class="page">

  @if (toast) {
    <div class="toast" [class.error]="toastType === 'error'">{{ toast }}</div>
  }

  <div class="page-header">
    <div>
      <h2>👥 Create Customer Group</h2>
      <p class="subtitle">Define pricing rules and group settings</p>
    </div>
    <button class="btn-back" (click)="cancel()">← Back</button>
  </div>

  <div class="form-card">

    <div class="form-section">
      <h3 class="section-title">Group Details</h3>
      <div class="form-row">
        <div class="form-group full">
          <label>Group Name <span class="required">*</span></label>
          <input type="text" [(ngModel)]="groupName" placeholder="e.g. Premium Dealers, Retail Customers" />
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="form-section">
      <h3 class="section-title">Pricing Configuration</h3>
      <div class="form-row">
        <div class="form-group">
          <label>GST Percentage (%)</label>
          <div class="input-with-icon">
            <input type="text" inputmode="decimal" [(ngModel)]="gstPercentage"
              placeholder="0.00" (blur)="formatField('gstPercentage')" />
            <span class="input-suffix">%</span>
          </div>
        </div>
        <div class="form-group">
          <label>Commission Percentage (%)</label>
          <div class="input-with-icon">
            <input type="text" inputmode="decimal" [(ngModel)]="commissionPercentage"
              placeholder="0.00" (blur)="formatField('commissionPercentage')" />
            <span class="input-suffix">%</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Discount (%)</label>
          <div class="input-with-icon">
            <input type="text" inputmode="decimal" [(ngModel)]="discount"
              placeholder="0.00" (blur)="formatField('discount')" />
            <span class="input-suffix">%</span>
          </div>
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" (click)="cancel()">Cancel</button>
      <button class="btn-submit" (click)="submit()" [disabled]="loading">
        @if (loading) {
          <span class="spinner-sm"></span> Creating...
        } @else {
          ✅ Create Group
        }
      </button>
    </div>

  </div>

</div>
